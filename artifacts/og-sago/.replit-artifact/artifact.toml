kind = "web"
previewPath = "/"
title = "OG SAGO"
version = "1.0.0"
id = "artifacts/og-sago"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25906

[services.development]
run = "pnpm --filter @workspace/og-sago run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/og-sago", "run", "build" ]
publicDir = "artifacts/og-sago/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25906"
BASE_PATH = "/"
